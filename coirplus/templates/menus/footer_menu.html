<div class="fs-5 fw-semibold footer-title">{{ menu_heading }}</div>
<ul class="list-unstyled">
    {% for item in menu_items %}
    <li class="nav-item">
        <a href="{{ item.href }}" class="nav-link {{ item.active_class }}">
            {{ item.text }}
        </a>
    </li>
    {% endfor %}
</ul>
