<div class="fs-4 fw-bold h section-title">FILTERS</div>
<form action="" method="get" hx-get="" hx-target="#shop-products" hx-indicator="#shop-products">
    <div class="d-none">
        {{ product_filters }}
    </div>
    <div class="d-flex flex-column gap-4 py-3">
        <div class="d-flex flex-column categories">
            <div class="fs-5 h fw-semibold">Shop by Category</div>
            {% include "components/category_sidebar_menu.html" with level=1 categories=parent_categories %}
        </div>
        {% for attribute in attributes %}
        <div class="d-flex flex-column gap-2 attribute attribute-{{ attribute.name }}">
            <div class="fs-5">Shop by {{ attribute.name }}</div>
            <div class="d-flex flex-column gap-2">
                {% for attribute_value in attribute.attribute_values.all %}
                <div class="d-flex gap-3 align-items-center">
                    <input type="checkbox" class="form-check-input fs-4" name="{{ attribute.slug }}" id="attribute_value-{{forloop.counter}}" value="{{ attribute_value.slug }}">
                    <label class="form-check-label" for="attribute_value-{{ forloop.counter}}">
                        <a hx-get="?{{ attribute.slug }}={{ attribute_value.slug }}" hx-target="#shop-products" hx-indicator="#shop-products" href="?{{ attribute.slug }}={{ attribute_value.slug }}" class="nav-link">{{ attribute_value.value }}</a>
                    </label>
                </div>
                {% endfor %}
            </div>
        </div>
        {% endfor %}
        <button class="btn btn-primary" type="submit">Filter</button>
    </div>
</form>
