{% with form=contact_form %}
<form action="" method="post" hx-post="" class="mt-3" novalidate>
    <div class="d-flex flex-column gap-3">
        {% for field in form %}
        <div>
            {{ field.label_tag }}
            {{ field }}
            {{ field.errors }}
        </div>
        {% endfor %}
        <div>
            <button class="btn btn-primary">Send Message</button>
        </div>
    </div>
</form>
{% endwith %}
