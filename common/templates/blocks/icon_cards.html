{% load wagtailcore_tags wagtailimages_tags %}
<div class="icon-cards">
    {% for card in self.cards %}
    <div class="icon-card">
        {% image card.icon|default:placeholder_image width-200 format-webp class="d-block w-100 h-auto mx-auto icon" %}
        <div class="card-title fs-5 h">{{ card.title }}</div>
        <div class="card-content">{% include_block card.description %}</div>
    </div>
    {% endfor %}
</div>
